<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nail Studio Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-shape bg-shape-1" aria-hidden="true"></div>
  <div class="bg-shape bg-shape-2" aria-hidden="true"></div>

  <header class="site-header">
    <div>
      <p class="eyebrow">Nail Art Studio</p>
      <h1>Nail Studio Vault</h1>
      <p class="subtitle">Track your polish collection, build designs, and keep your favorites in rotation.</p>
    </div>
    <div class="header-stats" id="headerStats" aria-live="polite"></div>
  </header>

  <main class="layout">
    <section class="card" aria-labelledby="add-polish-title">
      <h2 id="add-polish-title">Add Polish</h2>
      <form id="polishForm" class="form-grid">
        <label>
          Name
          <input name="name" type="text" required />
        </label>
        <label>
          Brand
          <input name="brand" type="text" required />
        </label>
        <label>
          Color
          <input name="color" type="color" value="#e2527d" aria-label="Choose polish color" />
        </label>
        <label>
          Finish
          <select name="finish" required>
            <option value="">Select finish</option>
            <option>Matte</option>
            <option>Gloss</option>
            <option>Glitter</option>
            <option>Chrome</option>
            <option>Jelly</option>
            <option>Holographic</option>
            <option>Cream</option>
          </select>
        </label>
        <label>
          Date Purchased
          <input name="datePurchased" type="date" required />
        </label>
        <label>
          Tags (comma separated)
          <input name="tags" type="text" placeholder="seasonal, work-safe" />
        </label>
        <button class="btn btn-primary" type="submit">Save Polish</button>
      </form>
    </section>

    <section class="card" aria-labelledby="inventory-title">
      <div class="section-head">
        <h2 id="inventory-title">Inventory</h2>
        <div class="inline-controls">
          <button class="btn btn-secondary" id="gridViewBtn" type="button" aria-pressed="true">Grid</button>
          <button class="btn btn-secondary" id="listViewBtn" type="button" aria-pressed="false">List</button>
        </div>
      </div>

      <div class="filters" aria-label="Inventory filters">
        <label>
          Search
          <input id="searchInput" type="text" placeholder="name or brand" />
        </label>
        <label>
          Color family
          <select id="colorFilter">
            <option value="all">All colors</option>
            <option value="red">Red</option>
            <option value="orange">Orange</option>
            <option value="yellow">Yellow</option>
            <option value="green">Green</option>
            <option value="blue">Blue</option>
            <option value="purple">Purple</option>
            <option value="pink">Pink</option>
            <option value="neutral">Neutral</option>
          </select>
        </label>
        <label>
          Finish
          <select id="finishFilter">
            <option value="all">All finishes</option>
          </select>
        </label>
        <label>
          Favorites
          <select id="favoriteFilter">
            <option value="all">All</option>
            <option value="favorites">Favorites</option>
          </select>
        </label>
        <label>
          Recently used
          <select id="recentFilter">
            <option value="all">Any time</option>
            <option value="7">Last 7 days</option>
            <option value="30">Last 30 days</option>
            <option value="never">Never used</option>
          </select>
        </label>
        <label>
          Sort by
          <select id="sortBy">
            <option value="date">Date purchased</option>
            <option value="uses">Most used</option>
            <option value="favorites">Favorites first</option>
          </select>
        </label>
      </div>

      <div id="inventoryContainer" class="inventory grid-view" role="list"></div>
    </section>

    <section class="card" aria-labelledby="generator-title">
      <h2 id="generator-title">Nail Art Generator</h2>
      <p class="help-text">Select up to 3 polishes or let the app suggest a set from your least-used shades.</p>
      <div id="generatorPolishList" class="generator-list" aria-label="Select polishes for design"></div>
      <div class="inline-controls">
        <button class="btn btn-secondary" id="autoSuggestBtn" type="button">Auto-suggest</button>
        <button class="btn btn-primary" id="generateDesignBtn" type="button">Generate Design</button>
      </div>
      <article id="generatedDesign" class="design-output" aria-live="polite"></article>
    </section>

    <section class="card" aria-labelledby="library-title">
      <div class="section-head">
        <h2 id="library-title">Design Library</h2>
        <div class="inline-controls">
          <label>
            Status
            <select id="designStatusFilter">
              <option value="all">All</option>
              <option value="tried">Tried</option>
              <option value="untried">Not tried</option>
            </select>
          </label>
          <label>
            Uses favorites
            <select id="designFavoriteFilter">
              <option value="all">All designs</option>
              <option value="favoritesOnly">With favorite polish</option>
            </select>
          </label>
        </div>
      </div>
      <div id="designLibrary" class="design-library" role="list"></div>
    </section>
  </main>

  <template id="polishCardTemplate">
    <article class="polish-card" role="listitem">
      <div class="swatch" aria-hidden="true"></div>
      <div class="polish-body">
        <h3 class="polish-name"></h3>
        <p class="polish-meta"></p>
        <p class="polish-tags"></p>
        <p class="polish-usage"></p>
      </div>
      <div class="polish-actions">
        <button class="btn btn-icon favorite-btn" type="button" aria-label="Toggle favorite">☆</button>
        <button class="btn btn-secondary small use-btn" type="button">Log Use</button>
        <button class="btn btn-danger small delete-btn" type="button">Delete</button>
      </div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
