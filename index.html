<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Polished</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="hero-page" data-page="generator">
  <main class="layout simple-layout">
    <section class="hero hero-full" aria-labelledby="hero-title">
      <p class="eyebrow hero-eyebrow">Nail Art Studio</p>
      <h1 id="hero-title" class="hero-title">Polished</h1>
      <p class="subtitle hero-subtitle">Create looks from your collection, then track what you loved.</p>
      <nav class="main-nav hero-nav" aria-label="Main menu">
        <a class="nav-link active" href="index.html#content">Nail Art Generator</a>
        <a class="nav-link" href="management.html#content">Polish Management</a>
        <a class="nav-link" href="inventory.html#content">Inventory Views</a>
        <a class="nav-link" href="library.html#content">Design Library</a>
      </nav>
    </section>

    <section id="content" class="card section-shell" aria-labelledby="generator-title">
      <h2 id="generator-title">Generate Design Ideas</h2>
      <p class="help-text">Select up to 3 polishes or let the app suggest a set from your least-used shades.</p>
      <div id="generatorPolishList" class="generator-list" aria-label="Select polishes for design"></div>
      <div class="inline-controls">
        <button class="btn btn-secondary" id="autoSuggestBtn" type="button">Auto-suggest</button>
        <button class="btn btn-primary" id="generateDesignBtn" type="button">Generate Design</button>
      </div>
      <article id="generatedDesign" class="design-output" aria-live="polite"></article>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
