<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Collection | Polished</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="hero-page" data-page="collection" data-default-view="list">
  <main class="layout simple-layout">
    <section class="hero hero-full" aria-labelledby="hero-title">
      <h1 id="hero-title" class="hero-title">Polished</h1>
      <p class="subtitle hero-subtitle">Manage your collection, filter, and switch views.</p>
      <nav class="main-nav hero-nav" aria-label="Main menu">
        <a class="nav-link active" href="index.html#content">My Collection</a>
        <a class="nav-link" href="generator.html#content">Nail Art Generator</a>
        <a class="nav-link" href="library.html#content">Design Library</a>
      </nav>
      <div class="hero-bottles" aria-hidden="true">
        <svg class="hero-bottle" style="left:5%;top:22%;transform:rotate(-14deg)" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 112">
          <ellipse cx="26" cy="107" rx="20" ry="4" fill="rgba(0,0,0,0.18)"/>
          <rect x="3" y="50" width="46" height="56" rx="12" fill="#e63946"/>
          <rect x="9" y="56" width="10" height="42" rx="5" fill="rgba(255,255,255,0.28)"/>
          <rect x="15" y="2" width="22" height="50" rx="3" fill="#1a1a1a"/>
          <rect x="19" y="6" width="5" height="30" rx="2" fill="rgba(255,255,255,0.12)"/>
        </svg>
        <svg class="hero-bottle" style="left:13%;top:62%;transform:rotate(10deg)" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 112">
          <ellipse cx="26" cy="107" rx="20" ry="4" fill="rgba(0,0,0,0.18)"/>
          <rect x="3" y="50" width="46" height="56" rx="12" fill="#d63384"/>
          <rect x="9" y="56" width="10" height="42" rx="5" fill="rgba(255,255,255,0.28)"/>
          <rect x="15" y="2" width="22" height="50" rx="3" fill="#1a1a1a"/>
          <rect x="19" y="6" width="5" height="30" rx="2" fill="rgba(255,255,255,0.12)"/>
        </svg>
        <svg class="hero-bottle" style="right:5%;top:20%;transform:rotate(13deg)" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 112">
          <ellipse cx="26" cy="107" rx="20" ry="4" fill="rgba(0,0,0,0.18)"/>
          <rect x="3" y="50" width="46" height="56" rx="12" fill="#ff6b6b"/>
          <rect x="9" y="56" width="10" height="42" rx="5" fill="rgba(255,255,255,0.28)"/>
          <rect x="15" y="2" width="22" height="50" rx="3" fill="#1a1a1a"/>
          <rect x="19" y="6" width="5" height="30" rx="2" fill="rgba(255,255,255,0.12)"/>
        </svg>
        <svg class="hero-bottle" style="right:14%;top:60%;transform:rotate(-8deg)" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 112">
          <ellipse cx="26" cy="107" rx="20" ry="4" fill="rgba(0,0,0,0.18)"/>
          <rect x="3" y="50" width="46" height="56" rx="12" fill="#a855f7"/>
          <rect x="9" y="56" width="10" height="42" rx="5" fill="rgba(255,255,255,0.28)"/>
          <rect x="15" y="2" width="22" height="50" rx="3" fill="#1a1a1a"/>
          <rect x="19" y="6" width="5" height="30" rx="2" fill="rgba(255,255,255,0.12)"/>
        </svg>
      </div>
    </section>

    <section id="content" class="card section-shell" aria-labelledby="manage-title">
      <div class="section-head">
        <h2 id="manage-title">My Collection</h2>
        <div class="inline-controls">
          <button class="btn btn-secondary" id="gridViewBtn" type="button" aria-pressed="false">Grid</button>
          <button class="btn btn-secondary" id="listViewBtn" type="button" aria-pressed="true">List</button>
          <button id="toggleAddForm" class="btn btn-primary" type="button" aria-expanded="false" aria-controls="addPolishPanel">+ Add Polish</button>
        </div>
      </div>

      <div id="addPolishPanel" class="add-panel" hidden>
        <form id="polishForm" class="form-grid">
          <div class="url-lookup">
            <label for="polishUrlInput">Product URL <span class="help-text inline">(paste a link to auto-fill)</span></label>
            <div class="url-input-row">
              <input id="polishUrlInput" type="url" placeholder="https://www.nailpolish.com/..." autocomplete="off" />
              <button id="polishUrlBtn" class="btn btn-secondary" type="button">Auto-fill</button>
            </div>
            <p id="polishUrlStatus" class="url-status" aria-live="polite"></p>
          </div>
          <label>
            Name
            <input name="name" type="text" required />
          </label>
          <label>
            Brand
            <input name="brand" type="text" required />
          </label>
          <label>
            Color
            <input name="color" type="color" value="#e2527d" aria-label="Choose polish color" />
          </label>
          <label>
            Formula
            <select name="formula" required>
              <option value="">Select formula</option>
              <option>Matte</option>
              <option>Gloss</option>
              <option>Glitter</option>
              <option>Chrome</option>
              <option>Jelly</option>
              <option>Holographic</option>
              <option>Crème</option>
            </select>
          </label>
          <label>
            Date Purchased
            <input name="datePurchased" type="date" required />
          </label>
          <label>
            Image URL
            <input name="imageUrl" type="url" placeholder="https://..." required />
          </label>
          <div class="form-actions">
            <button class="btn btn-primary" type="submit">Save Polish</button>
            <button id="cancelAddForm" class="btn btn-secondary" type="button">Cancel</button>
          </div>
        </form>
      </div>

      <div class="filters" aria-label="Inventory filters">
        <label>
          Search
          <input id="searchInput" type="text" placeholder="Name of polish" />
        </label>
        <label>
          Brand
          <select id="brandFilter">
            <option value="all">All brands</option>
          </select>
        </label>
        <label>
          Color family
          <select id="colorFilter">
            <option value="all">All colors</option>
            <option value="red">Red</option>
            <option value="orange">Orange</option>
            <option value="yellow">Yellow</option>
            <option value="green">Green</option>
            <option value="blue">Blue</option>
            <option value="purple">Purple</option>
            <option value="pink">Pink</option>
            <option value="neutral">Neutral</option>
          </select>
        </label>
        <label>
          Formula
          <select id="formulaFilter">
            <option value="all">All formulas</option>
            <option value="Matte">Matte</option>
            <option value="Gloss">Gloss</option>
            <option value="Glitter">Glitter</option>
            <option value="Chrome">Chrome</option>
            <option value="Jelly">Jelly</option>
            <option value="Holographic">Holographic</option>
            <option value="Crème">Crème</option>
          </select>
        </label>
        <label>
          Recently used
          <select id="recentFilter">
            <option value="all">Any time</option>
            <option value="7">Last 7 days</option>
            <option value="30">Last 30 days</option>
            <option value="never">Never used</option>
          </select>
        </label>
        <label>
          Sort by
          <select id="sortBy">
            <option value="date">Date purchased</option>
            <option value="uses">Most used</option>
            <option value="favorites">Favorites first</option>
          </select>
        </label>
        <label>
          Favorites
          <span class="filter-toggle-row">
            <input id="favoriteFilter" class="filter-toggle-input" type="checkbox" />
            <span class="filter-toggle-switch" aria-hidden="true"></span>
            <span>Favorites only</span>
          </span>
        </label>
      </div>

      <div id="inventoryContainer" class="inventory list-view" role="list"></div>
    </section>
  </main>

  <template id="polishCardTemplate">
    <article class="polish-card" role="listitem">
      <div class="swatch" aria-hidden="true"></div>
      <div class="polish-body">
        <h3 class="polish-name"></h3>
        <p class="polish-meta"></p>
        <p class="polish-image-wrap"></p>
        <p class="polish-usage"></p>
      </div>
      <div class="polish-actions">
        <button class="btn btn-icon favorite-btn" type="button" aria-label="Toggle favorite">☆</button>
        <div class="polish-actions-bottom">
          <button class="btn btn-secondary small use-btn" type="button">Log Use</button>
          <button class="btn btn-secondary small remove-use-btn" type="button">Remove Use</button>
          <button class="btn btn-danger small delete-btn" type="button">Delete</button>
        </div>
      </div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
